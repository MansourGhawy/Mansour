name: Build Android APK Pro

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3 # استخدمنا v3 للاستقرار

      - name: Set up JDK 17
        uses: actions/setup-java@v3 # استخدمنا v3 لتجنب خطأ التحميل
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Habayeb-App
          path: app/build/outputs/apk/debug/*.apk
