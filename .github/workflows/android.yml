name: Build My App Now

on:
  push:
    branches: [ "main" ] # تأكد أن اسم فرعك main وليس master
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # هذا لإظهار الزر اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Package
          path: app/build/outputs/apk/debug/*.apk
